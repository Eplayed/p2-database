<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PoE2 数据控制台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">p2-database</p>
          <h1>PoE2 数据控制台</h1>
          <p class="subtle">本地抓取、生成、校验和上传 OSS 的可视化入口。</p>
        </div>
        <div class="env-switch" role="group" aria-label="环境选择">
          <button class="env-btn active" data-env="release">release</button>
          <button class="env-btn" data-env="dev">dev</button>
        </div>
      </header>

      <section class="status-grid" id="summary"></section>

      <section class="panel automation-panel">
        <div class="panel-head">
          <div>
            <h2>本地自动运行</h2>
            <p>页面保持打开时生效；到点会先弹出 5 秒倒计时，确认区服和页面状态后再运行。</p>
          </div>
          <div class="panel-actions">
            <button class="ghost-btn" id="automationSaveBtn">保存设置</button>
            <button class="danger-btn" id="automationToggleBtn">开启自动运行</button>
          </div>
        </div>
        <div class="automation-grid">
          <label class="field">
            <span>任务</span>
            <select id="automationTaskSelect"></select>
          </label>
          <label class="field">
            <span>间隔（分钟）</span>
            <input id="automationIntervalInput" type="number" min="10" step="5" value="120" />
          </label>
          <label class="field">
            <span>浮动（分钟）</span>
            <input id="automationJitterInput" type="number" min="0" step="1" value="10" />
          </label>
          <div class="automation-status">
            <span id="automationStatusText">未开启</span>
            <span id="automationNextText">下次：-</span>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>任务</h2>
            <p>同一时间只运行一个任务，长任务可以在下方日志区看实时输出。</p>
          </div>
          <div class="panel-actions">
            <button class="danger-btn" id="stopBtn" disabled>停止当前任务</button>
            <button class="ghost-btn" id="refreshBtn">刷新状态</button>
          </div>
        </div>
        <div id="taskGrid"></div>
      </section>

      <section class="panel log-panel">
        <div class="panel-head">
          <div>
            <h2>运行日志</h2>
            <p id="logTitle">暂无运行任务</p>
          </div>
          <div class="panel-actions">
            <span class="log-follow-status" id="logFollowStatus">自动跟随日志</span>
            <button class="ghost-btn" id="scrollLogBottomBtn" hidden>回到底部</button>
          </div>
        </div>
        <pre id="logOutput">选择并运行一个任务后，这里会显示日志。</pre>
      </section>
    </main>

    <div class="countdown-mask" id="countdownMask" hidden>
      <div class="countdown-card">
        <span class="countdown-eyebrow">自动运行提醒</span>
        <h2 id="countdownTitle">准备运行任务</h2>
        <p id="countdownMessage">请确认页面状态正确。</p>
        <strong id="countdownNumber">5</strong>
        <div class="countdown-actions">
          <button class="ghost-btn" id="countdownRunNowBtn">立即运行</button>
          <button class="danger-btn" id="countdownCancelBtn">取消本次</button>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
