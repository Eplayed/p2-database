name: Auto Crawl and Upload to OSS

on:
  push:
    branches: [ main ]
  schedule:
    # 北京时间每天上午 9 点执行 (UTC+8 = UTC+0 - 8小时)
    - cron: '0 1 */3 * *'
  workflow_dispatch: # 允许手动触发

env:
  NODE_ENV: production
  OSS_REGION: oss-cn-hangzhou
  OSS_BUCKET: poe2-all-class
  OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
  OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

jobs:
  crawl-and-upload:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Puppeteer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libnss3 \
          libatk-bridge2.0-0 \
          libdrm2 \
          libxkbcommon0 \
          libxcomposite1 \
          libxdamage1 \
          libxrandr2 \
          libgbm1 \
          libxss1 \
          libasound2t64
          
    - name: Increase max open files limit (prevent ulimit error)
      run: ulimit -n 4096
          
    - name: Create auto_browser/.env file
      run: |
        mkdir -p auto_browser
        cat > auto_browser/.env << EOF
        NODE_ENV=production
        DEV_OSS_PATH=dev/
        PROD_OSS_PATH=release/
        OSS_REGION=oss-cn-hangzhou
        OSS_BUCKET=poe2-all-class
        OSS_ACCESS_KEY_ID=${{ secrets.OSS_ACCESS_KEY_ID }}
        OSS_ACCESS_KEY_SECRET=${{ secrets.OSS_ACCESS_KEY_SECRET }}
        OSS_ENDPOINT=https://oss-cn-hangzhou.aliyuncs.com
        EOF
        
    - name: Ensure translated-data directory exists
      run: |
        mkdir -p translated-data/release
        
    - name: Run crawl and upload
      run: npm run cron:prod
      
    - name: Upload artifacts (for debugging)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: translated-data
        path: translated-data/
        retention-days: 7
