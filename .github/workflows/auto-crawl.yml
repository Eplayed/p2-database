name: 天梯翻译爬虫

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '运行环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

env:
  OSS_REGION: oss-cn-hangzhou
  OSS_BUCKET: poe2-all-class
  OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
  OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

jobs:
  crawl-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine environment
      id: env
      run: |
        ENV=${{ inputs.environment || 'production' }}
        echo "Running in $ENV mode"
        echo "env_name=$ENV" >> $GITHUB_OUTPUT

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install system dependencies for Puppeteer
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libnss3 \
          libatk-bridge2.0-0 \
          libdrm2 \
          libxkbcommon0 \
          libxcomposite1 \
          libxdamage1 \
          libxrandr2 \
          libgbm1 \
          libxss1 \
          libasound2t64 \
          libpangocairo-1.0-0 \
          libgtk-3-0 \
          fonts-liberation \
          wget \
          gnupg

    - name: Install Chrome for Puppeteer
      run: |
        npx puppeteer browsers install chrome
        echo "PUPPETEER_EXECUTABLE_PATH=$(npx puppeteer browsers path chrome)" >> $GITHUB_ENV

    - name: Optimize system for CI
      run: |
        ulimit -n 8192
        sudo sysctl -w vm.swappiness=10
        echo "=== System Memory ==="
        free -h
        echo "=== Disk Space ==="
        df -h / /home

    - name: Create auto_browser/.env file
      run: |
        mkdir -p auto_browser
        cat > auto_browser/.env << EOF
        NODE_ENV=${{ steps.env.outputs.env_name }}
        CI=true
        DEV_OSS_PATH=dev/
        PROD_OSS_PATH=release/
        OSS_REGION=oss-cn-hangzhou
        OSS_BUCKET=poe2-all-class
        OSS_ACCESS_KEY_ID=${{ secrets.OSS_ACCESS_KEY_ID }}
        OSS_ACCESS_KEY_SECRET=${{ secrets.OSS_ACCESS_KEY_SECRET }}
        OSS_ENDPOINT=https://oss-cn-hangzhou.aliyuncs.com
        EOF

    - name: Ensure directories exist
      run: |
        mkdir -p translated-data/release translated-data/dev
        mkdir -p auto_browser/data/screenshots

    - name: Run unified crawler (v3)
      run: node crawlers/run.js --ladder --upload
      env:
        NODE_ENV: ${{ steps.env.outputs.env_name }}
        CI: true
      timeout-minutes: 20

    - name: Refresh starter recommendations
      run: node crawlers/starter/index.js
      env:
        NODE_ENV: ${{ steps.env.outputs.env_name }}
        CI: true

    - name: Upload starter recommendations
      run: node -e "require('./auto_browser/upload_to_oss')()"
      env:
        NODE_ENV: ${{ steps.env.outputs.env_name }}
        CI: true

    - name: Upload artifacts (for debugging)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: crawl-data-${{ github.run_number }}
        path: |
          translated-data/
          auto_browser/data/
        retention-days: 7
