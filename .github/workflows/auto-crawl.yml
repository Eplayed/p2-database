name: 天梯翻译爬虫

on:
  push:
    branches: [ main ]
  schedule:
    # 北京时间每天上午 9 点执行
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动触发
    inputs:
      environment:
        description: '运行环境'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - production

env:
  OSS_REGION: oss-cn-hangzhou
  OSS_BUCKET: poe2-all-class
  OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
  OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

jobs:
  crawl-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25  # 设置超时时间为 25 分钟（留 5 分钟缓冲）

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine environment
      id: env
      run: |
        ENV=${{ inputs.environment || 'production' }}
        echo "Running in $ENV mode"
        echo "env_name=$ENV" >> $GITHUB_OUTPUT

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install system dependencies for Puppeteer
      run: |
        # 更新并安装必要的系统库
        sudo apt-get update
        sudo apt-get install -y \
          libnss3 \
          libatk-bridge2.0-0 \
          libdrm2 \
          libxkbcommon0 \
          libxcomposite1 \
          libxdamage1 \
          libxrandr2 \
          libgbm1 \
          libxss1 \
          libasound2t64 \
          libpangocairo-1.0-0 \
          libgtk-3-0 \
          fonts-liberation \
          wget \
          gnupg

    - name: Install Chrome for Puppeteer
      run: |
        npx puppeteer browsers install chrome
        echo "PUPPETEER_EXECUTABLE_PATH=$(npx puppeteer browsers path chrome)" >> $GITHUB_ENV

    - name: Optimize system for CI
      run: |
        # 增加文件描述符限制
        ulimit -n 8192
        # 禁用不必要的服务释放内存
        sudo sysctl -w vm.swappiness=10
        # 显示系统状态
        echo "=== System Memory ==="
        free -h
        echo "=== Disk Space ==="
        df -h / /home

    - name: Create auto_browser/.env file
      run: |
        mkdir -p auto_browser
        cat > auto_browser/.env << EOF
        NODE_ENV=${{ steps.env.outputs.env_name }}
        CI=true
        DEV_OSS_PATH=dev/
        PROD_OSS_PATH=release/
        OSS_REGION=oss-cn-hangzhou
        OSS_BUCKET=poe2-all-class
        OSS_ACCESS_KEY_ID=${{ secrets.OSS_ACCESS_KEY_ID }}
        OSS_ACCESS_KEY_SECRET=${{ secrets.OSS_ACCESS_KEY_SECRET }}
        OSS_ENDPOINT=https://oss-cn-hangzhou.aliyuncs.com
        EOF

    - name: Ensure directories exist
      run: |
        mkdir -p translated-data/release translated-data/dev
        mkdir -p auto_browser/data/screenshots

    - name: Run unified crawler (production)
      if: steps.env.outputs.env_name == 'production'
      run: node run_crawler.js --translate --full
      env:
        NODE_ENV: production
        CI: true
      timeout-minutes: 20  # 爬虫最多运行 20 分钟

    - name: Run unified crawler (dev)
      if: steps.env.outputs.env_name == 'dev'
      run: node run_crawler.js --translate --full
      env:
        NODE_ENV: dev
        CI: true
      timeout-minutes: 20

    - name: Upload artifacts (for debugging)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: crawl-data-${{ github.run_number }}
        path: |
          translated-data/
          auto_browser/data/
        retention-days: 7

    - name: Aggregate ladder analysis data
      run: node scripts/aggregate_analysis.js

    - name: Upload ladder_analysis.json to OSS (production)
      if: steps.env.outputs.env_name == 'production'
      run: node scripts/upload_analysis.js
      env:
        NODE_ENV: production
        OSS_PATH: 'release/'

    - name: Upload ladder_analysis.json to OSS (dev)
      if: steps.env.outputs.env_name == 'dev'
      run: node scripts/upload_analysis.js
      env:
        NODE_ENV: dev
        OSS_PATH: 'dev/'
