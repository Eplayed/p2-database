name: Update PoE2 Economy

on:
  schedule:
    # 北京时间每天 4:00, 10:00, 16:00, 22:00 运行 (UTC 时间)
    - cron: '0 20,2,8,14 * * *'
  workflow_dispatch: # 允许手动点击按钮触发

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Crawler & Upload
        env:
          CI: true
          OSS_REGION: oss-cn-hangzhou
          OSS_BUCKET: poe2-all-class
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          NODE_ENV: production
        run: node auto_browser/crawl_economy.js

      - name: Refresh 0.5 economy output
        env:
          CI: true
          OSS_REGION: oss-cn-hangzhou
          OSS_BUCKET: poe2-all-class
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          NODE_ENV: production
        run: node crawlers/patch05/index.js

      - name: Upload refreshed 0.5 economy data
        env:
          CI: true
          OSS_REGION: oss-cn-hangzhou
          OSS_BUCKET: poe2-all-class
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          NODE_ENV: production
        run: node -e "require('./auto_browser/upload_to_oss')()"
